# etc/jnxfh.cfg — sample config for the jnxfh feed handler process.
#
# Usage:  cpp/build/jnxfh --config=etc/jnxfh.cfg
# Any key here can also be overridden on the command line, e.g.:
#   cpp/build/jnxfh --config=etc/jnxfh.cfg --bootstrap=glimpse
#
# See cpp/fh/jnxfh_main.cpp header comment for the authoritative key
# list; JNX_PLAN2.md §1/§8 for the restart-matrix and target-validation
# background these values exist for.

# --- exchange (ITCH over SoupBinTCP) ---------------------------------------
itch_host=itch.uat.japannext.co.jp
itch_port=15001
user=CHANGEME
pass=CHANGEME

# --- GLIMPSE snapshot endpoint (only used when bootstrap=glimpse) ---------
glimpse_host=glimpse.uat.japannext.co.jp
glimpse_port=15002

# --- jnxdb link -------------------------------------------------------------
# Must match etc/jnxdb.cfg's `sock=`.
db_sock=/run/jnx/db.sock
# 0 = start even if jnxdb is unreachable at boot (recommended — jnxfh
#     stays live on the exchange and retries the DB link every 1 s; see
#     RECOVERY.md §2). 1 = refuse to start without jnxdb (rarely wanted).
require_db=0

# --- cold-start bootstrap (ignored on a warm jnxdb-recovered restart —
#     see RECOVERY.md §1, the recovery decision tree takes priority) -------
#   replay  = log in at sequence 1, full-session replay from the exchange
#   glimpse = GLIMPSE snapshot, then live from the snapshot's cut-in seq
bootstrap=replay

# --- multicast publication --------------------------------------------------
mcast_group=239.192.1.1
mcast_port=26400
mcast_ttl=1
# Interface address multicast is sent from (empty = kernel default route;
# set explicitly on multi-homed hosts, and ALWAYS in loopback dry runs —
# see OPERATIONS.md "dry run").
mcast_if=
