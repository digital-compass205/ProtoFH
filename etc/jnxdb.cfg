# etc/jnxdb.cfg — sample config for the jnxdb in-memory database process.
#
# Usage:  cpp/build/jnxdb --config=etc/jnxdb.cfg
# Any key here can also be overridden on the command line, e.g.:
#   cpp/build/jnxdb --config=etc/jnxdb.cfg --query_port=26402
#
# jnxdb has no persistence and no other process-level state — this is the
# entire config surface (see cpp/db/jnxdb_main.cpp header comment).

# UNIX domain stream socket jnxfh connects to for record ingest. The
# directory must exist and be writable by the jnxdb user; jnxdb creates
# and unlinks the socket file itself.
sock=/run/jnx/db.sock

# TCP port for the operator/recovery query protocol (dbquery.py, jnxfh's
# GET_STATE recovery). Binds 127.0.0.1 only — not exposed off-box.
query_port=26401
